<div class="title">翻訳</div><br>&nbsp;翻訳の言語を選択して、翻訳ボタンを押してください。&nbsp;&nbsp;&nbsp;&nbsp;<br>
<img alt="" src="images/image041.png" width="530" height="133">
&nbsp;&nbsp;<br><br>
&nbsp;翻訳、逆翻訳、翻訳信頼度チェックが実行されます。&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
<img alt="" src="images/image048.png" width="596" height="426">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
&nbsp;翻訳信頼度は３段階です。&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
&nbsp;&nbsp;黄緑&nbsp;&nbsp;&nbsp;＞&nbsp;&nbsp;高い<br>
&nbsp;&nbsp;黄&nbsp;&nbsp;&nbsp;＞&nbsp;&nbsp;まあまあ<br>
&nbsp;&nbsp;赤&nbsp;&nbsp;&nbsp;＞&nbsp;&nbsp;低い<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
&nbsp;翻訳信頼度が低い場合、&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
&nbsp;原文、または訳文を修正することで、&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
&nbsp;翻訳信頼度を改善させることができます。&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<br>
